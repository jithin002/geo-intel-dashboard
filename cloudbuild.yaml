# Google Cloud Build configuration for automated builds and deployment
# This file tells GCP Cloud Build how to build and deploy your app

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/geo-intel-dashboard:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/geo-intel-dashboard:$SHORT_SHA'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/geo-intel-dashboard'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/geo-intel-dashboard:$SHORT_SHA'
      - '--location=us-central1'

  # Alternative Step 3: Deploy using gcloud (simpler)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'geo-intel-dashboard'
      - '--image=gcr.io/$PROJECT_ID/geo-intel-dashboard:latest'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'

# Build configuration
images:
  - 'gcr.io/$PROJECT_ID/geo-intel-dashboard:latest'
  - 'gcr.io/$PROJECT_ID/geo-intel-dashboard:$SHORT_SHA'

# Options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Build timeout (45 minutes)
timeout: '2700s'

# Substitutions (pass custom values)
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'geo-intel-dashboard'
