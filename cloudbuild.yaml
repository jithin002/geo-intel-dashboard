# Cloud Build — Geo-Intel Dashboard Frontend
# Uses --substitutions instead of secretEnv to avoid Cloud Build Secret Manager permission issues.
# Values are passed directly via: gcloud builds submit --substitutions=_KEY=value
# ─────────────────────────────────────────────────────────────────────────────

steps:
  # ── Step 1: Build frontend image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID} \
          --build-arg VITE_PLACES_PROXY_URL=${_VITE_PLACES_PROXY_URL} \
          --build-arg VITE_GEMINI_PROXY_URL=${_VITE_GEMINI_PROXY_URL} \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard:$SHORT_SHA \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard:latest \
          .

  # ── Step 2: Push image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard'
    waitFor: ['build-frontend']

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'geo-intel-dashboard'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard:$SHORT_SHA'
      - '--platform=managed'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
    waitFor: ['push-frontend']

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/geo-intel/dashboard:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
